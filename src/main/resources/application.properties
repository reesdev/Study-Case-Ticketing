spring.application.name=ticketing-api

# Database connection (MySQL)
# Gunakan database ticketing_db
spring.datasource.url=jdbc:mysql://localhost:3306/ticketing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Awas10

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration (Secret Key & Expiration)
# Secret key harus cukup panjang (minimal 256 bit untuk HS256)
jwt.secret=IniAdalahSecretKeyYangSangatPanjangUntukJWTTokenSistemTicketingBootcamp
jwt.expiration=86400000

# Server port
server.port=8080
